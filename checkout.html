<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout - Gadrel Collection</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Checkout</h1>
    <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="checkout.html">Cart (<span id="cart-count">0</span>)</a>
  </nav>
</header>

  <section class="checkout-form">
    <form id="paymentForm">
      <label for="email">Email:</label>
      <input type="email" id="email-address" required />

      <label for="amount">Amount (₦):</label>
      <input type="number" id="amount" readonly />

      <label for="name">Full Name:</label>
      <input type="text" id="customer-name" required />

      <button type="submit">Pay Now</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2025 Gadrel Collection</p>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const total = localStorage.getItem("cartTotal");
      if (total) {
        document.getElementById("amount").value = total;
      }
    });

    const paymentForm = document.getElementById('paymentForm');
    paymentForm.addEventListener("submit", payWithPaystack, false);

    function payWithPaystack(e) {
      e.preventDefault();
      let handler = PaystackPop.setup({
        key: 'your-public-key', // Replace with your Paystack public key
        email: document.getElementById("email-address").value,
        amount: document.getElementById("amount").value * 100,
        currency: "NGN",
        name: document.getElementById("customer-name").value,
        callback: function(response) {
          const order = {
            reference: response.reference,
            name: document.getElementById("customer-name").value,
            email: document.getElementById("email-address").value,
            amount: document.getElementById("amount").value
          };
          localStorage.setItem("lastOrder", JSON.stringify(order));
          window.location.href = "confirmation.html";
        },
        onClose: function() {
          alert('Transaction was not completed.');
        }
      });
      handler.openIframe();
    }
  </script>
  <script src="https://js.paystack.co/v1/inline.js"></script>
</body>
</html>
