<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout - Gadrel Collection</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="top-nav">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="checkout.html">Cart (<span id="cart-count">0</span>)</a></li>
    </ul>
  </nav>

  <header>
    <h1>Your Cart</h1>
  </header>

  <section class="cart-section" id="cart-items"></section>

  <section class="cart-summary">
    <h2>Total: ₦<span id="cart-total">0</span></h2>
    <button class="checkout-button" onclick="proceedToPayment()">Proceed to Payment</button>
  </section>

<footer class="site-footer">
  <div class="footer-content">
    <p>&copy; 2025 Gadrel Collection. All rights reserved.</p>
    <div class="footer-links">
      <a href="https://instagram.com/gadrelcollection" target="_blank">Instagram</a>
     <a href="mailto:support@gadrelcollection.com">Email Us</a>
    </div>
  </div>
</footer>
  <a href="https://wa.me/2348105429924" class="whatsapp-float" target="_blank" title="Chat with us">
  🟢 Chat on WhatsApp
</a>
  <script>
    const cart = JSON.parse(localStorage.getItem("cart")) || [];

    function renderCart() {
      const container = document.getElementById("cart-items");
      const totalDisplay = document.getElementById("cart-total");
      const cartCount = document.getElementById("cart-count");

      container.innerHTML = "";
      let total = 0;

      cart.forEach(item => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;

        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `
          <h3>${item.name}</h3>
          <p>₦${item.price} x ${item.quantity} = ₦${itemTotal}</p>
        `;
        container.appendChild(div);
      });

      totalDisplay.textContent = total;
      cartCount.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
    }

    function proceedToPayment() {
      alert("Redirecting to payment gateway...");
      // Replace with actual payment integration or redirect
      window.location.href = "payment.html";
    }

    document.addEventListener("DOMContentLoaded", renderCart);
  </script>
</body>
</html>
