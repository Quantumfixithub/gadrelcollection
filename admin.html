<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Vertical Navigation -->
  <nav class="vertical-nav">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li>
        <a href="#">Shop</a>
        <ul class="dropdown">
          <li><a href="mens.html">Men</a></li>
          <li><a href="womens.html">Women</a></li>
          <li><a href="accessories.html">Accessories</a></li>
        </ul>
      </li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="checkout.html">Cart (<span id="cart-count">0</span>)</a></li>
    </ul>
  </nav>

  <!-- Page Header -->
  <header>
    <h1>Order Dashboard</h1>
  </header>

  <!-- Order Viewer -->
  <section>
    <button onclick="exportOrder()">View Last Order</button>
    <pre id="order-output"></pre>
  </section>

  <!-- Script to display last order -->
  <script>
    function exportOrder() {
      const order = JSON.parse(localStorage.getItem("lastOrder"));
      const output = document.getElementById("order-output");
      if (order) {
        output.textContent = JSON.stringify(order, null, 2);
      } else {
        output.textContent = "No order found.";
      }
    }

    // Update cart count on page load
    document.addEventListener("DOMContentLoaded", () => {
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      const cartCount = document.getElementById("cart-count");
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      cartCount.textContent = totalItems;
    });
  </script>
</body>
</html>
