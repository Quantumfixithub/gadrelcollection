<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Men's Collection - Gadrel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Vertical Navigation -->
<nav class="top-nav">
  <ul>
    <li><a href="index.html">Home</a></li>
    <li class="dropdown-parent">
      <a href="#">Shop</a>
      <ul class="dropdown">
        <li><a href="mens.html">Men</a></li>
        <li><a href="womens.html">Women</a></li>
        <li><a href="accessories.html">Accessories</a></li>
      </ul>
    </li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="checkout.html">Cart (<span id="cart-count">0</span>)</a></li>
  </ul>
</nav>


  <!-- Page Header -->
  <header>
    <h1>Men's Collection</h1>
  </header>

  <!-- Product Grid -->
  <section class="product-grid" id="product-list">
    <!-- Products will be loaded here -->
  </section>
 <!-- Footer -->
  <footer>
    <p>&copy; 2025 Gadrel Collection</p>
  </footer>

  <!-- Load filtered products -->
  <script src="category.js"></script>

  <!-- Update cart count -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      const cartCount = document.getElementById("cart-count");
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      cartCount.textContent = totalItems;
    });
  </script>
</body>
</html>
