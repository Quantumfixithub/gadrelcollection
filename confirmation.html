<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Confirmation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Thank You for Your Order!</h1>
    <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="checkout.html">Cart (<span id="cart-count">0</span>)</a>
  </nav>
  </header>

  <section>
    <ul id="order-details"></ul>
  </section>

  <footer>
    <p>&copy; 2025 Gadrel Collection</p>
  </footer>

  <script>
    const order = JSON.parse(localStorage.getItem("lastOrder"));
    const list = document.getElementById("order-details");
    if (order) {
      list.innerHTML = `
        <li><strong>Name:</strong> ${order.name}</li>
        <li><strong>Email:</strong> ${order.email}</li>
        <li><strong>Amount:</strong> ₦${order.amount}</li>
        <li><strong>Reference:</strong> ${order.reference}</li>
      `;
    }
  </script>
</body>
</html>
