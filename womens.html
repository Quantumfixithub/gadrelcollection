<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Women's Collection - Gadrel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Optional: Mobile Nav Toggle -->
  <button class="nav-toggle" onclick="toggleNav()">☰ Menu</button>

  <!-- Top Navigation -->
  <nav class="top-nav">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li class="dropdown-parent">
        <a href="#">Shop</a>
        <ul class="dropdown">
          <li><a href="mens.html">Men</a></li>
          <li><a href="womens.html">Women</a></li>
          <li><a href="accessories.html">Accessories</a></li>
        </ul>
      </li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="checkout.html">Cart (<span id="cart-count">0</span>)</a></li>
    </ul>
  </nav>

  <!-- Page Header -->
  <header>
    <h1>Women's Collection</h1>
  </header>

  <!-- Product Grid -->
  <section class="product-grid" id="product-list">
    <!-- Products will be loaded here -->
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2025 Gadrel Collection</p>
  </footer>

  <!-- Load filtered products -->
  <script src="category.js"></script>

  <!-- Modal Viewer -->
  <div id="image-modal" class="modal" onclick="closeModal()">
    <span class="close">&times;</span>
    <img class="modal-content" id="modal-img" />
    <div id="modal-caption"></div>
  </div>

  <style>
    .modal {
      display: none;
      position: fixed;
      z-index: 999;
      padding-top: 60px;
      left: 0; top: 0;
      width: 100%; height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.9);
    }
    .modal-content {
      margin: auto;
      display: block;
      max-width: 90%;
      max-height: 80vh;
    }
    #modal-caption {
      text-align: center;
      color: #fff;
      padding: 1rem;
    }
    .close {
      position: absolute;
      top: 20px; right: 35px;
      color: #fff;
      font-size: 40px;
      font-weight: bold;
      cursor: pointer;
    }

    /* ✅ Add to Cart Button Styling */
    .shop-button {
      background-color: #111;
      color: #fff;
      padding: 0.6rem 1.5rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease, transform 0.2s ease;
      margin-top: 0.5rem;
      width: 100%;
    }

    .shop-button:hover {
      background-color: #333;
      transform: scale(1.02);
    }
  </style>

  <script>
    function openModal(src, caption) {
      const modal = document.getElementById("image-modal");
      const modalImg = document.getElementById("modal-img");
      const modalCaption = document.getElementById("modal-caption");
      modal.style.display = "block";
      modalImg.src = src;
      modalCaption.textContent = caption;
    }

    function closeModal() {
      document.getElementById("image-modal").style.display = "none";
    }

    document.addEventListener("DOMContentLoaded", () => {
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      const cartCount = document.getElementById("cart-count");
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      cartCount.textContent = totalItems;
    });

    function toggleNav() {
      const nav = document.querySelector('.vertical-nav');
      nav.classList.toggle('active');
    }
  </script>
  <footer class="site-footer">
  <div class="footer-content">
    <p>&copy; 2025 Gadrel Collection. All rights reserved.</p>
    <div class="footer-links">
      <a href="https://instagram.com/gadrelcollection" target="_blank">Instagram</a>
            <a href="mailto:support@gadrelcollection.com">Email Us</a>
    </div>
  </div>
</footer>
<a href="https://wa.me/2348105429924" class="whatsapp-float" target="_blank" title="Chat with us">
  🟢 Chat on WhatsApp
</a>

</body>
</html>
