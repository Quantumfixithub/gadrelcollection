<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment - Gadrel Collection</title>
  <script src="https://js.paystack.co/v2/inline.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Secure Payment</h1>
  </header>

  <section class="payment-section">
    <form id="payment-form" onsubmit="payWithPaystack(event)">
      <label for="email">Email:</label>
      <input type="email" id="email-address" required />

      <label for="amount">Amount (₦):</label>
      <input type="number" id="amount" required />

      <button type="submit">Pay Now</button>
    </form>
  </section>

 

  <script>
    function payWithPaystack(e) {
      e.preventDefault();
      const email = document.getElementById("email-address").value;
      const amount = document.getElementById("amount").value * 100; // Convert to kobo

      const paystack = new PaystackPop();
      paystack.newTransaction({
        key: 'pk_test_xxxxxxxxxxxxxxxxxxxxxxxx', // Replace with your public key
        email: email,
        amount: amount,
        onSuccess: (transaction) => {
          alert(`Payment complete! Reference: ${transaction.reference}`);
          window.location.href = "confirmation.html";
        },
        onCancel: () => {
          alert("Payment cancelled.");
        }
      });
    }
  </script>
  <footer class="site-footer">
  <div class="footer-content">
    <p>&copy; 2025 Gadrel Collection. All rights reserved.</p>
    <div class="footer-links">
      <a href="https://instagram.com/gadrelcollection" target="_blank">Instagram</a>
      <a href="https://wa.me/2348123456789" target="_blank">WhatsApp</a>
      <a href="mailto:support@gadrelcollection.com">Email Us</a>
    </div>
  </div>
</footer>
<a href="https://wa.me/2348123456789" class="whatsapp-float" target="_blank" title="Chat with us">
  🟢 Chat on WhatsApp
</a>

</body>
</html>
