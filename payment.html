<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secure Payment - Gadrel Collection</title>
  <script src="https://js.paystack.co/v2/inline.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- Top Navigation -->
  <nav class="top-nav">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li class="dropdown-parent">
        <a href="#">Shop</a>
        <ul class="dropdown">
          <li><a href="mens.html">Men</a></li>
          <li><a href="womens.html">Women</a></li>
          <li><a href="accessories.html">Accessories</a></li>
        </ul>
      </li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="checkout.html">Cart (<span id="cart-count">0</span>)</a></li>
    </ul>
  </nav>

  <!-- Page Header -->
  <header>
    <h1>💳 Secure Payment</h1>
    <p>Complete your purchase safely and quickly.</p>
  </header>

  <!-- Main Payment Section -->
  <main class="payment-section">
    <form id="payment-form" onsubmit="payWithPaystack(event)">
      <label for="email">Email Address</label>
      <input type="email" id="email-address" placeholder="you@example.com" required />

      <label for="amount">Amount (₦)</label>
      <input type="number" id="amount" placeholder="Enter amount" required />

      <button type="submit" class="shop-button">Pay Now</button>
    </form>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-content">
      <p>&copy; 2025 Gadrel Collection. All rights reserved.</p>
      <div class="footer-links">
        <a href="https://instagram.com/gadrelcollection" target="_blank">Instagram</a>
        <a href="mailto:support@gadrelcollection.com">Email Us</a>
      </div>
    </div>
  </footer>

  <!-- WhatsApp Chat Button -->
  <a href="https://wa.me/2348105429924" class="whatsapp-float" target="_blank" title="Chat with us">
    🟢 Chat on WhatsApp
  </a>

  <!-- Paystack Script -->
  <script>
    function payWithPaystack(e) {
      e.preventDefault();
      const email = document.getElementById("email-address").value;
      const amount = document.getElementById("amount").value * 100;

      const paystack = new PaystackPop();
      paystack.newTransaction({
        key: 'pk_test_xxxxxxxxxxxxxxxxxxxxxxxx', // Replace with your public key
        email: email,
        amount: amount,
        onSuccess: (transaction) => {
          alert(`Payment complete! Reference: ${transaction.reference}`);
          window.location.href = "confirmation.html";
        },
        onCancel: () => {
          alert("Payment cancelled.");
        }
      });
    }
  </script>
</body>
</html>
